design:
  study_name: norman-perturb-seq-pilot
  experiment_type: perturb_seq
  condition_summary: CRISPRi perturb-seq pilot with non-targeting controls and donor replicates.
  analysis_kind: comparative
  condition_fields:
    - perturbation
  batch_fields:
    - donor
