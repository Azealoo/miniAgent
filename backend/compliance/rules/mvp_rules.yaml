schema_version: "1.0.0"
rules:
  - rule_id: biosafety-high-risk-agent
    category: biosafety
    severity: critical
    recommended_action: require_approval
    sources: [message, attachments]
    patterns:
      - '\b(bsl[-\s]?(3|4)|select agent|gain[-\s]?of[-\s]?function|enhance (pathogen|viral) transmissibility)\b'
  - rule_id: human-subjects-oversight
    category: human_subjects
    severity: high
    recommended_action: require_approval
    sources: [message, attachments]
    patterns:
      - '\b(human subjects?|irb|institutional review board|consent waiver|participant recruitment)\b'
  - rule_id: privacy-direct-identifiers
    category: privacy
    severity: high
    recommended_action: require_approval
    sources: [message, attachments]
    patterns:
      - '\b(mrn|medical record number|date of birth|dob|social security number|ssn|patient name|direct identifiers?|hipaa)\b'
      - '(patient|subject|mrn|phi|hipaa)[-_a-z0-9]*(\.(csv|tsv|xlsx|xls|txt|json|yaml|yml))\b'
  - rule_id: privacy-deidentified-human-data
    category: privacy
    severity: low
    recommended_action: allow_with_warning
    sources: [message, attachments]
    patterns:
      - '\b(de-identified|deidentified|anonymized|anonymised|coded patient metadata)\b'
  - rule_id: dangerous-procedure-pathogen-guidance
    category: dangerous_procedure
    severity: critical
    recommended_action: block
    sources: [message]
    patterns:
      - '\b(step[-\s]?by[-\s]?step|procedure|instructions?)\b.*\b(culture|grow|propagate|amplify|isolate|synthesize|assemble)\b.*\b(sars[-\s]?cov[-\s]?2|influenza|anthrax|ricin|botulinum|pathogen|virus|toxin)\b'
      - '\bhow (do|to)\b.*\b(culture|grow|propagate|amplify|isolate|synthesize|assemble)\b.*\b(sars[-\s]?cov[-\s]?2|influenza|anthrax|ricin|botulinum|pathogen|virus|toxin)\b'
  - rule_id: export-sensitive-transfer
    category: export_control
    severity: high
    recommended_action: require_approval
    sources: [message, attachments]
    patterns:
      - '\b(export|ship|transfer|send overseas|international collaborator|outside the us|outside the united states)\b.*\b(human (samples|tissue|specimens|genomic data)|pathogen|select agent|controlled data|sequencing data)\b'
